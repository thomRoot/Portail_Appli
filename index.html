<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Appli - ThomRoot</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>Portail Appli</h1>
            <div class="api-status" id="apiStatus">
                <i class="fas fa-circle" id="apiStatusIcon"></i>
                <span id="apiStatusText">Vérification API...</span>
            </div>
        </div>
        <button id="addSiteBtn" class="add-btn">
            <i class="fas fa-plus"></i> Ajouter un site
        </button>
    </header>

    <div class="weather-container" id="weatherContainer">
        <div class="weather-header">
            <i class="fas fa-chart-line"></i>
            <span>Météo à Aulnay-sous-Bois - Prévisions 24h</span>
            <div class="weather-controls">
                <button class="weather-tab active" data-type="chart">Graphique</button>
                <button class="weather-tab" data-type="details">Détails 24h</button>
            </div>
        </div>
        
        <div class="weather-content">
            <!-- Onglet Graphique -->
            <div class="weather-tab-content active" id="weatherChartContent">
                <div class="chart-container">
                    <canvas id="weatherChart"></canvas>
                </div>
            </div>
            
            <!-- Onglet Détails -->
            <div class="weather-tab-content" id="weatherDetailsContent">
                <div class="weather-details-grid" id="weatherDetailsGrid">
                    <!-- Les détails seront ajoutés dynamiquement -->
                </div>
            </div>
        </div>
        
        <div class="weather-summary" id="weatherSummary">
            <div class="summary-item">
                <i class="fas fa-thermometer-half"></i>
                <span id="currentTemp">--°C</span>
                <span class="summary-label">Température actuelle</span>
            </div>
            <div class="summary-item">
                <i class="fas fa-tint"></i>
                <span id="currentHumidity">--%</span>
                <span class="summary-label">Humidité</span>
            </div>
            <div class="summary-item">
                <i class="fas fa-wind"></i>
                <span id="currentWind">-- km/h</span>
                <span class="summary-label">Vent</span>
            </div>
            <div class="summary-item">
                <i class="fas fa-cloud-rain"></i>
                <span id="currentRain">-- mm</span>
                <span class="summary-label">Précipitations</span>
            </div>
        </div>
    </div>

    <main class="apps-container" id="appsContainer">
        <!-- Les icônes des sites seront ajoutées dynamiquement ici -->
    </main>

    <!-- Popup pour ajouter un site -->
    <div id="addSiteModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Ajouter un nouveau site</h2>
            <form id="addSiteForm">
                <div class="form-group">
                    <label for="siteName">Nom du site :</label>
                    <input type="text" id="siteName" name="siteName" required placeholder="Mon Site">
                </div>
                <div class="form-group">
                    <label for="siteUrl">URL du site :</label>
                    <input type="url" id="siteUrl" name="siteUrl" required placeholder="https://exemple.com">
                </div>
                <div class="form-group">
                    <label for="siteIcon">Icône du site :</label>
                    <input type="file" id="siteIcon" name="siteIcon" accept="image/*" required>
                    <div class="image-preview" id="imagePreview">
                        <p>Aucune image sélectionnée</p>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" id="cancelBtn">Annuler</button>
                    <button type="submit" class="submit-btn">Ajouter</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
